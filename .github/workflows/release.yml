name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3, without v prefix)"
        required: true
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate inputs
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          VERSION_FILE_PATH="internal/index/version.txt"
          if ! grep -q "$NEW_VERSION" "$VERSION_FILE_PATH"; then
            echo "error: scip-go version in $VERSION_FILE_PATH doesn't match NEW_VERSION=$NEW_VERSION"
            exit 1
          fi
          if ! grep -q "## v$NEW_VERSION" CHANGELOG.md; then
            echo "error: Missing CHANGELOG entry for v$NEW_VERSION"
            exit 1
          fi

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

  create-release:
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ inputs.version }}
        run: |
          gh release create "$TAG" --title "scip-go $TAG" --generate-notes \
            || echo "Release $TAG already exists"

  binaries:
    needs: create-release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            asset: scip-go-linux-amd64
          - runner: ubuntu-24.04-arm
            asset: scip-go-linux-arm64
          - runner: macos-latest
            asset: scip-go-darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}
      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix build .#scip-go

      - name: Package
        run: |
          cp result/bin/scip-go .
          tar czf "${{ matrix.asset }}.tar.gz" scip-go LICENSE
          sha256sum "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ inputs.version }}" \
            "${{ matrix.asset }}.tar.gz" \
            "${{ matrix.asset }}.tar.gz.sha256" \
            --clobber

  docker:
    needs: create-release
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}
      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build Docker image
        run: nix build .#docker

      - name: Load and push single-arch image
        run: |
          docker load < result
          VERSION="$(cat internal/index/version.txt)"

      - uses: azure/docker-login@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push arch-specific image
        run: |
          VERSION="$(cat internal/index/version.txt)"
          ARCH_TAG="sourcegraph/scip-go:v${VERSION}-${{ matrix.arch }}"
          docker tag "scip-go:$VERSION" "$ARCH_TAG"
          docker push "$ARCH_TAG"

  docker-manifest:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ inputs.version }}

      - uses: azure/docker-login@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION="$(cat internal/index/version.txt)"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          AMD64="sourcegraph/scip-go:v${VERSION}-amd64"
          ARM64="sourcegraph/scip-go:v${VERSION}-arm64"
          for TAG in "v$VERSION" "v$MAJOR" "v$MAJOR.$MINOR" "latest"; do
            docker manifest create "sourcegraph/scip-go:$TAG" "$AMD64" "$ARM64"
            docker manifest push "sourcegraph/scip-go:$TAG"
          done
