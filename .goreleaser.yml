project_name: scip-go
version: 2

dist: release

env:
  - GO111MODULE=on
  - CGO_ENABLED=0

before:
  hooks:
    - go mod download
    - go mod tidy

builds:
-
  main: ./cmd/scip-go/
  binary: scip-go
  ldflags:
    - -X main.version={{.Version}}
  goos:
    - linux
    - windows
    - darwin
  goarch:
    - amd64
    - arm64

archives:
- id: tarball
  format: tar.gz

changelog:
  sort: asc
  filters:
    exclude:
    - '^docs:'
    - '^test:'
